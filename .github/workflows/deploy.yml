name: Build, Test & Stage

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (used as staging folder name, e.g. v1.0.0)'
        required: true
        type: string
      skip_tests:
        description: 'Skip the test job and deploy directly'
        required: false
        type: boolean
        default: false

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1: Restore + Build + Integration tests + UI tests
  # ────────────────────────────────────────────────────────────────
  test:
    name: Test
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore WhatYouDid.slnx

      - name: Build
        run: dotnet build WhatYouDid.slnx --no-restore -c Debug

      # ── Integration tests (Testcontainers / SQL Server in Docker) ──
      # The dummy connection string satisfies Program.cs's startup check (no User Secrets in CI).
      # ApiWebApplicationFactory replaces the real DbContextFactory with a Testcontainers one anyway.
      - name: Run integration tests
        env:
          ConnectionStrings__DevelopmentConnection: "Server=localhost;Database=placeholder;Trusted_Connection=True;"
        run: dotnet test WhatYouDid.Tests/WhatYouDid.Tests.csproj --no-build -c Debug

      # ── Playwright UI tests ──
      - name: Install Playwright browsers
        run: pwsh WhatYouDid.UITests/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run UI tests
        env:
          ConnectionStrings__DevelopmentConnection: "Server=localhost;Database=placeholder;Trusted_Connection=True;"
        run: dotnet test WhatYouDid.UITests/WhatYouDid.UITests.csproj --no-build -c Debug

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: WhatYouDid.UITests/bin/Debug/net10.0/playwright-traces/

  # ────────────────────────────────────────────────────────────────
  # Job 2: Publish win-x64 and copy to staging folder on server
  # Only runs if tests passed.
  # ────────────────────────────────────────────────────────────────
  stage:
    name: Publish & Stage
    runs-on: ubuntu-latest
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore WhatYouDid.slnx

      - name: Publish (win-x64 framework-dependent)
        run: |
          dotnet publish WhatYouDid/WhatYouDid/WhatYouDid.csproj \
            -c Release -r win-x64 \
            -o ./publish

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Compress publish output
        run: cd ./publish && zip -r ../publish.zip .

      - name: Upload build to server
        run: |
          scp -o StrictHostKeyChecking=no \
            publish.zip \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.STAGING_TARGET_PATH }}/publish.zip"

      - name: Extract build on server
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "powershell -Command \"Expand-Archive -Path '${{ secrets.STAGING_TARGET_PATH }}\\publish.zip' -DestinationPath '${{ secrets.STAGING_TARGET_PATH }}\\What You Did (${{ inputs.tag }})' -Force\""

      # ────── Promote to live ──────
      - name: Run deploy script
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "powershell -ExecutionPolicy Bypass -File \"${{ secrets.DEPLOY_SCRIPT_PATH }}\" \
              -SiteName \"${{ secrets.DEPLOY_SITE_NAME }}\" \
              -AppPool \"${{ secrets.DEPLOY_APP_POOL }}\" \
              -LivePath \"${{ secrets.DEPLOY_TARGET_PATH }}\" \
              -StagingPath \"${{ secrets.STAGING_TARGET_PATH }}\" \
              -Tag \"${{ inputs.tag }}\" \
              -ConfigBackupPath \"${{ secrets.DEPLOY_CONFIG_BACKUP_PATH }}\" \
              -BackupPath \"${{ secrets.DEPLOY_BACKUP_PATH }}\"" 2>&1
