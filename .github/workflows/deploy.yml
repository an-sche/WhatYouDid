name: Build, Test & Stage

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (used as staging folder name, e.g. v1.0.0)'
        required: true
        type: string
      skip_tests:
        description: 'Skip the test job and deploy directly'
        required: false
        type: boolean
        default: false

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1: Restore + Build + Integration tests + UI tests
  # ────────────────────────────────────────────────────────────────
  test:
    name: Test
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore WhatYouDid.slnx

      - name: Build
        run: dotnet build WhatYouDid.slnx --no-restore -c Debug

      # ── Integration tests (Testcontainers / SQL Server in Docker) ──
      # The dummy connection string satisfies Program.cs's startup check (no User Secrets in CI).
      # ApiWebApplicationFactory replaces the real DbContextFactory with a Testcontainers one anyway.
      - name: Run integration tests
        env:
          ConnectionStrings__DevelopmentConnection: "Server=localhost;Database=placeholder;Trusted_Connection=True;"
        run: dotnet test WhatYouDid.Tests/WhatYouDid.Tests.csproj --no-build -c Debug

      # ── Playwright UI tests ──
      - name: Install Playwright browsers
        run: pwsh WhatYouDid.UITests/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run UI tests
        env:
          ConnectionStrings__DevelopmentConnection: "Server=localhost;Database=placeholder;Trusted_Connection=True;"
        run: dotnet test WhatYouDid.UITests/WhatYouDid.UITests.csproj --no-build -c Debug

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: WhatYouDid.UITests/bin/Debug/net10.0/playwright-traces/

  # ────────────────────────────────────────────────────────────────
  # Job 2: Publish win-x64 and copy to staging folder on server
  # Only runs if tests passed.
  # ────────────────────────────────────────────────────────────────
  stage:
    name: Publish & Stage
    runs-on: ubuntu-latest
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore WhatYouDid.slnx

      - name: Publish (win-x64 self-contained)
        run: |
          dotnet publish WhatYouDid/WhatYouDid/WhatYouDid.csproj \
            -c Release -r win-x64 --self-contained \
            -o ./publish

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      # Staging folder: <STAGING_TARGET_PATH>\What You Did (<tag>)
      # The path uses Windows backslashes on the remote side; SCP target
      # uses forward slashes so the Linux scp client handles it correctly.
      - name: Create staging directory on server
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "powershell -Command \"New-Item -ItemType Directory -Force -Path '${{ secrets.STAGING_TARGET_PATH }}\\What You Did (${{ inputs.tag }})'\""

      - name: Copy published files to staging folder
        run: |
          scp -r -o StrictHostKeyChecking=no \
            ./publish/* \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.STAGING_TARGET_PATH }}/What You Did (${{ inputs.tag }})/"

      # ────── Promote to live ──────
      - name: Stop IIS
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "powershell -Command \"\$ErrorActionPreference='Stop'; Stop-WebSite -Name '${{ secrets.DEPLOY_SITE_NAME }}'; Stop-WebAppPool -Name '${{ secrets.DEPLOY_APP_POOL }}'; Write-Output 'IIS stopped'\"" 2>&1

      - name: Backup live folder
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "powershell -Command \"\$ErrorActionPreference='Stop'; \$src='${{ secrets.DEPLOY_TARGET_PATH }}'; \$backup=\$src+'_'+(Get-Date -Format 'yyyy-MM-dd_HH-mm-ss'); Write-Output ('Source: '+\$src); Write-Output ('Backup: '+\$backup); if(-not(Test-Path \$src)){throw('Source path does not exist: '+\$src)}; Move-Item -Path \$src -Destination \$backup; New-Item -ItemType Directory -Force -Path \$src | Out-Null; Write-Output 'Backup complete'\"" 2>&1

      - name: Copy new build to live folder
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "powershell -Command \"\$ErrorActionPreference='Stop'; Copy-Item -Recurse -Force '${{ secrets.STAGING_TARGET_PATH }}\\What You Did (${{ inputs.tag }})\\*' '${{ secrets.DEPLOY_TARGET_PATH }}\\'; Write-Output 'Copy complete'\"" 2>&1

      - name: Restore config backups
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "powershell -Command \"\$ErrorActionPreference='Stop'; Copy-Item -Recurse -Force '${{ secrets.DEPLOY_CONFIG_BACKUP_PATH }}\\*' '${{ secrets.DEPLOY_TARGET_PATH }}\\'; Write-Output 'Config restore complete'\"" 2>&1

      - name: Start IIS
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "powershell -Command \"\$ErrorActionPreference='Stop'; Start-WebAppPool -Name '${{ secrets.DEPLOY_APP_POOL }}'; Start-WebSite -Name '${{ secrets.DEPLOY_SITE_NAME }}'; Write-Output 'IIS started'\"" 2>&1
